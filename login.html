<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 80px;
    }

    input {
      padding: 10px;
      margin: 8px;
      width: 250px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>🔐 Login</h2>

<input id="email" type="email" placeholder="Email">
<br>
<input id="password" type="password" placeholder="Password">
<br>

<button id="loginBtn">Login</button>

<script type="module">

// ✅ Firebase imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ✅ ✅ FULL Firebase config (IMPORTANT)
const firebaseConfig = {
  apiKey: "AIzaSyCWsKLiMjUREhEpMZarud5j2K6rLDQqsSo",
  authDomain: "bookmydoctor-6c93c.firebaseapp.com",
  projectId: "bookmydoctor-6c93c",
  storageBucket: "bookmydoctor-6c93c.firebasestorage.app",
  messagingSenderId: "88063096613",
  appId: "1:88063096613:web:293c77b09078d943964ccc"
};

// ✅ Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ✅ LOGIN FUNCTION
document.getElementById("loginBtn").onclick = async () => {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);

    console.log("✅ Logged in:", userCredential.user);

    alert("✅ Login successful");

    // ✅ go to main app
    window.location.href = "index.html";

  } catch (err) {
    console.error("❌ Error:", err.code, err.message);
    alert(err.message); // ✅ shows real error
  }
};

</script>

</body>
</html>
