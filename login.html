<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول - BookMyDoctor</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg" />
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    .login-wrap { min-height: 100vh; display:flex; align-items:center; justify-content:center; padding: 20px; }
    .login-card { width: 100%; max-width: 420px; padding: 28px; }
    .login-card h1 { margin: 0 0 6px; font-size: 22px; }
    .login-card p.muted { margin: 0 0 18px; }
    .login-card .field { margin-bottom: 14px; }
    .login-card .brand { display:flex; align-items:center; gap:10px; margin-bottom: 14px; }
    .login-card .brand img { width:42px; height:42px; border-radius:8px; object-fit:cover; }
    .login-error { color:#b00020; font-size: 14px; margin-top: 6px; min-height: 18px; }
    .login-info { color:#0a7d2c; font-size: 14px; margin-top: 6px; min-height: 18px; }
    .forgot-row { margin-top: 10px; text-align: left; }
    .forgot-link { background:none; border:none; color:#1565c0; cursor:pointer; font-size: 14px; padding:0; text-decoration: underline; font-family: inherit; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <section class="card login-card">
      <div class="brand">
        <img src="logo.jpg" alt="BookMyDoctor" />
        <div>
          <h1>BookMyDoctor</h1>
          <p class="muted">تسجيل الدخول إلى حسابك</p>
        </div>
      </div>

      <form id="loginForm">
        <div class="field">
          <label for="loginEmail">البريد الإلكتروني</label>
          <input type="email" id="loginEmail" autocomplete="email" required placeholder="example@email.com" />
        </div>
        <div class="field">
          <label for="loginPassword">كلمة المرور</label>
          <input type="password" id="loginPassword" autocomplete="current-password" required placeholder="••••••••" />
        </div>
        <button class="btn primary" type="submit" id="loginBtn" style="width:100%">دخول</button>
        <div class="forgot-row">
          <button type="button" id="forgotBtn" class="forgot-link">هل نسيت كلمة المرور؟</button>
        </div>
        <div class="login-error" id="loginError"></div>
        <div class="login-info" id="loginInfo"></div>
      </form>
    </section>
  </div>

  <script type="module">
    import { auth } from "./firebase-config.js";
    import {
      signInWithEmailAndPassword,
      sendPasswordResetEmail,
      onAuthStateChanged,
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // If already logged in, skip the login page
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.replace("index.html");
    });

    const form = document.getElementById("loginForm");
    const errEl = document.getElementById("loginError");
    const infoEl = document.getElementById("loginInfo");
    const btn = document.getElementById("loginBtn");
    const forgotBtn = document.getElementById("forgotBtn");

    const errorMap = {
      "auth/invalid-credential": "بيانات الدخول غير صحيحة",
      "auth/invalid-email": "بريد إلكتروني غير صالح",
      "auth/user-not-found": "المستخدم غير موجود",
      "auth/wrong-password": "كلمة المرور غير صحيحة",
      "auth/too-many-requests": "محاولات كثيرة، حاول لاحقاً",
      "auth/missing-email": "من فضلك أدخل البريد الإلكتروني",
    };

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errEl.textContent = "";
      infoEl.textContent = "";
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      btn.disabled = true;
      btn.textContent = "جاري الدخول...";
      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.replace("index.html");
      } catch (err) {
        console.error(err);
        errEl.textContent = errorMap[err.code] || "تعذر تسجيل الدخول";
      } finally {
        btn.disabled = false;
        btn.textContent = "دخول";
      }
    });

    forgotBtn.addEventListener("click", async () => {
      errEl.textContent = "";
      infoEl.textContent = "";
      const email = document.getElementById("loginEmail").value.trim();
      if (!email) {
        errEl.textContent = "من فضلك أدخل بريدك الإلكتروني أولاً ثم اضغط على \"هل نسيت كلمة المرور؟\"";
        return;
      }
      forgotBtn.disabled = true;
      const originalText = forgotBtn.textContent;
      forgotBtn.textContent = "جاري الإرسال...";
      try {
        await sendPasswordResetEmail(auth, email);
        infoEl.textContent = "تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك الإلكتروني. تحقق من صندوق الوارد (وأيضاً مجلد الـ Spam).";
      } catch (err) {
        console.error(err);
        errEl.textContent = errorMap[err.code] || "تعذر إرسال رابط إعادة التعيين";
      } finally {
        forgotBtn.disabled = false;
        forgotBtn.textContent = originalText;
      }
    });
  </script>
</body>
</html>
